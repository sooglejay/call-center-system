name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '20'

jobs:
  # 后端代码检查和构建
  server:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 9
    
    - name: Install dependencies
      working-directory: ./server
      run: pnpm install --frozen-lockfile
    
    - name: Type check
      working-directory: ./server
      run: pnpm exec tsc --noEmit
    
    - name: Build
      working-directory: ./server
      run: pnpm build

  # 前端代码检查和构建
  client:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 9
    
    - name: Install dependencies
      working-directory: ./client
      run: pnpm install --frozen-lockfile
    
    - name: Type check
      working-directory: ./client
      run: pnpm exec tsc --noEmit
    
    - name: Build
      working-directory: ./client
      run: pnpm build

  # Docker 构建测试
  docker:
    runs-on: ubuntu-latest
    needs: [server, client]
    steps:
    - uses: actions/checkout@v4
    
    - name: Build backend image
      run: docker build -t callcenter-backend:test ./server
    
    - name: Build frontend image
      run: docker build -t callcenter-frontend:test ./client
