# =====================================================
# 方式二：子路径配置（当前启用）
# 在现有域名的子路径下访问，如 yourdomain.com/callcenter/
# =====================================================
server {
    listen 80;
    listen [::]:80;
    server_name _;  # 匹配所有域名，或改为你的域名如 example.com

    # ================================================
    # 客服外呼系统配置 - 开始
    # 以下配置可以安全地添加到任何现有的 server 块中
    # ================================================

    # 前端页面 - /callcenter/
    location /callcenter/ {
        proxy_pass http://callcenter_frontend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # API 接口 - /callcenter/api/
    location /callcenter/api/ {
        proxy_pass http://callcenter_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
    }

    # 上传文件代理 - /callcenter/uploads/
    # APK 下载等上传资源由后端提供，避免页面在子路径部署时访问旧域名或 404
    location /callcenter/uploads/ {
        proxy_pass http://callcenter_backend/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
    }

    # 静态资源缓存 - /callcenter/assets/
    location /callcenter/assets/ {
        proxy_pass http://callcenter_frontend/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ================================================
    # 客服外呼系统配置 - 结束
    # ================================================

    # 以下是你的其他网站配置...
    # location / {
    #     ...
    # }
}

