# =====================================================
# 客服外呼系统 - Nginx 配置文件
# 文件位置: /etc/nginx/conf.d/callcenter.conf
# 
# 说明:
#   此配置文件独立于其他网站，不会影响现有服务
#   Nginx 会自动加载 /etc/nginx/conf.d/*.conf 文件
#
# 使用方式:
#   1. 复制此文件到 Nginx 配置目录:
#      cp nginx-callcenter.conf /etc/nginx/conf.d/callcenter.conf
#   
#   2. 修改配置中的域名和端口（如果需要）
#   
#   3. 测试并重载 Nginx:
#      nginx -t && nginx -s reload
# =====================================================

# 上游服务器定义 - 后端 API
upstream callcenter_backend {
    server 127.0.0.1:8081;
    keepalive 32;
}

# 上游服务器定义 - 前端
upstream callcenter_frontend {
    server 127.0.0.1:8080;
    keepalive 32;
}

