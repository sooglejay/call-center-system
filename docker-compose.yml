version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: call-center-db
    environment:
      POSTGRES_USER: callcenter
      POSTGRES_PASSWORD: callcenter123
      POSTGRES_DB: callcenter
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U callcenter"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 后端服务
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: call-center-server
    environment:
      PORT: 5001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: callcenter
      DB_USER: callcenter
      DB_PASSWORD: callcenter123
      JWT_SECRET: your-secret-key-change-in-production
      NODE_ENV: production
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server/uploads:/app/uploads
    restart: unless-stopped

  # 前端服务
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: call-center-client
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres_data:
