services:
  # 后端 API 服务
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: callcenter-backend
    restart: always
    ports:
      - "${API_PORT:-8081}:8081"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
      - PORT=8081
      - DB_TYPE=sqlite
      - SQLITE_PATH=/app/data/database.sqlite
      - JWT_SECRET=${JWT_SECRET:-call-center-secret-key-2024}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 前端 Web 服务
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # 子路径部署时设置为子路径，如 /callcenter
        # 直接访问端口时设置为 /
        # 注意：修改此值后需要重新构建前端镜像
        VITE_BASE_PATH: "${VITE_BASE_PATH:-/}"
    container_name: callcenter-frontend
    restart: always
    ports:
      - "${HTTP_PORT:-8080}:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
